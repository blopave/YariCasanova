<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Página no encontrada — Yari Casanova</title>
  <meta name="theme-color" content="#0a0a0a">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,700&family=Libre+Franklin:wght@300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0a0a0a;
      color: #f0ebe4;
      font-family: 'Libre Franklin', sans-serif;
      text-align: center;
      padding: 2rem;
    }

    .code {
      font-family: 'Fraunces', serif;
      font-size: clamp(4rem, 12vw, 8rem);
      font-weight: 700;
      letter-spacing: -.04em;
      background: linear-gradient(135deg, #c9a96e, #8a6d3b);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
      margin-bottom: .5rem;
    }

    .msg {
      font-size: clamp(.9rem, 2vw, 1.1rem);
      font-weight: 300;
      color: rgba(240, 235, 228, .5);
      max-width: 28ch;
      line-height: 1.6;
      margin-bottom: 2.5rem;
    }

    .back {
      font-family: 'Libre Franklin', sans-serif;
      font-size: .85rem;
      font-weight: 300;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: rgba(240, 235, 228, .4);
      text-decoration: none;
      border-bottom: 1px solid rgba(240, 235, 228, .15);
      padding-bottom: .25rem;
      transition: color .3s, border-color .3s;
    }

    .back:hover {
      color: #c9a96e;
      border-color: #c9a96e;
    }
  </style>
</head>
<body>
  <div class="code">404</div>
  <p class="msg">Esta obra no existe — todavía.</p>
  <a href="/" class="back">Volver al inicio</a>
</body>
</html>
